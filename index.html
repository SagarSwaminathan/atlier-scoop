<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1E3328">
<title>Atelier Scoops — Rewards</title>
<meta name="description" content="Premium artisan ice cream loyalty app. Earn points, unlock secret flavors, pay with your wallet.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --f:1E3328;--f2:#2A4A38;--g:#B8922A;--g2:#FAEEDA;--gt:#633806;
  --ink:#1A1A18;--iv:#FAF7F2;--iv2:#F0EBE0;--iv3:#E8E2D6;
  --st:#8A8578;--st2:#C8C3B8;--bd:rgba(30,51,40,0.12);--bd2:rgba(30,51,40,0.2);
}
html,body{font-family:'Jost',sans-serif;font-weight:300;-webkit-font-smoothing:antialiased;background:#1E3328;overscroll-behavior:none;height:100%}
.serif{font-family:'Cormorant Garamond',serif}
.ns::-webkit-scrollbar{display:none}
.ns{-ms-overflow-style:none;scrollbar-width:none}
.tap{transition:transform .1s}
.tap:active{transform:scale(0.96)}

/* ── PHONE FRAME (desktop) ── */
.desktop{display:none}
.mobile{display:flex;flex-direction:column;height:100dvh}

@media(min-width:600px){
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:32px 16px}
  .desktop{display:flex;align-items:center;gap:56px}
  .mobile{display:none}
  .phone-wrap{width:375px;height:812px;border-radius:44px;overflow:hidden;border:8px solid #0D1A12;position:relative;flex-shrink:0;box-shadow:0 40px 80px rgba(0,0,0,0.55)}
  .phone-notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:120px;height:28px;background:#0D1A12;border-radius:0 0 18px 18px;z-index:20}
  .phone-inner{height:100%;display:flex;flex-direction:column}
  .side-info{max-width:280px;color:#FAF7F2}
}

/* ── APP SHELL ── */
.app{display:flex;flex-direction:column;height:100%;background:#F5F0E8;position:relative;overflow:hidden}

/* ── STATUS BAR ── */
.sbar{height:44px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 22px 8px;flex-shrink:0;background:#1E3328}
.sbar-time{font-size:14px;font-weight:500;color:#FAF7F2}
.sbar-icons{display:flex;gap:5px;align-items:center}

/* ── TOP BAR ── */
.tbar{height:52px;background:#1E3328;display:flex;align-items:center;justify-content:space-between;padding:0 18px;flex-shrink:0}
.tbar-brand{font-family:'Cormorant Garamond',serif;color:#FAF7F2;font-size:18px;font-weight:500;letter-spacing:.1em;display:flex;align-items:center;gap:6px}
.gem{width:5px;height:5px;border-radius:50%;background:#B8922A;flex-shrink:0}
.tbar-icons{display:flex;gap:14px;align-items:center}
.bell-btn{background:none;border:none;cursor:pointer;position:relative;width:24px;height:24px;display:flex;align-items:center;justify-content:center;padding:0}
.bell-btn svg{stroke:#FAF7F2}
.badge{position:absolute;top:-3px;right:-3px;width:16px;height:16px;background:#B8922A;border-radius:50%;font-size:9px;font-weight:500;color:#FAF7F2;display:flex;align-items:center;justify-content:center;border:2px solid #1E3328;font-family:'Jost',sans-serif}
.av-btn{width:28px;height:28px;border-radius:50%;background:#B8922A;border:none;cursor:pointer;font-family:'Jost',sans-serif;font-size:11px;font-weight:500;color:#FAF7F2;display:flex;align-items:center;justify-content:center}

/* ── SCROLL AREA ── */
.scroll-area{flex:1;overflow-y:auto;padding:16px}

/* ── BOTTOM TABS ── */
.btabs{height:72px;background:#FAF7F2;border-top:1px solid rgba(30,51,40,0.1);display:flex;align-items:stretch;padding-bottom:8px;flex-shrink:0}
.bt{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;cursor:pointer;padding-top:6px}
.bt svg{width:22px;height:22px;fill:none;stroke:#C8C3B8;stroke-width:1.6;transition:stroke .15s}
.bt span{font-family:'Jost',sans-serif;font-size:10px;font-weight:400;color:#C8C3B8;letter-spacing:.04em;transition:color .15s}
.bt .dot{width:4px;height:4px;border-radius:50%;background:transparent;transition:background .15s}
.bt.on svg{stroke:#1E3328}
.bt.on span{color:#1E3328;font-weight:500}
.bt.on .dot{background:#B8922A}

/* ── SCREENS ── */
.screen{display:none;animation:fadeIn .18s ease}
.screen.on{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* ── SHARED COMPONENTS ── */
.sec-head{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;color:#1A1A18;letter-spacing:.03em;padding-bottom:10px;border-bottom:1px solid rgba(30,51,40,0.12);margin-bottom:12px}
.lbl{font-size:10px;font-weight:400;letter-spacing:.14em;text-transform:uppercase;color:#8A8578;font-family:'Jost',sans-serif}
.card{background:#FAF7F2;border:1px solid rgba(30,51,40,0.12);border-radius:14px;padding:14px;margin-bottom:10px}

/* ── WALLET HERO ── */
.w-hero{background:#1E3328;border-radius:20px;padding:22px 20px;margin-bottom:14px;position:relative;overflow:hidden}
.w-hero::after{content:'';position:absolute;top:-30px;right:-30px;width:140px;height:140px;border-radius:50%;border:1px solid rgba(184,146,42,0.12)}
.w-hero::before{content:'';position:absolute;bottom:-50px;right:16px;width:110px;height:110px;border-radius:50%;border:1px solid rgba(184,146,42,0.07)}
.w-eye{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:rgba(250,247,242,0.4);margin-bottom:5px;font-family:'Jost',sans-serif}
.w-bal{font-family:'Cormorant Garamond',serif;font-size:44px;font-weight:500;color:#FAF7F2;line-height:1}
.w-bal sup{font-size:18px;font-weight:400;vertical-align:super}
.w-foot{display:flex;align-items:flex-end;justify-content:space-between;margin-top:14px}
.w-name{color:rgba(250,247,242,0.45);font-size:11px;font-family:'Jost',sans-serif;letter-spacing:.05em}
.w-tier{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#B8922A;border:1px solid rgba(184,146,42,0.4);padding:2px 9px;border-radius:2px;font-family:'Jost',sans-serif}

/* ── ACTION GRID ── */
.act-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.act-btn{padding:12px 8px;border-radius:12px;border:1px solid rgba(30,51,40,0.15);background:#FAF7F2;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
.act-btn.dark{background:#1E3328;border-color:#1E3328}
.act-ico{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center}
.act-ico svg{width:16px;height:16px;fill:none;stroke-width:1.8}
.act-lbl{font-family:'Jost',sans-serif;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:#1A1A18;font-weight:400}
.act-btn.dark .act-lbl{color:#FAF7F2}

/* ── PROGRESS ── */
.prog-track{background:rgba(30,51,40,0.1);border-radius:20px;height:3px;margin:10px 0 5px;overflow:hidden}
.prog-fill{height:100%;border-radius:20px;background:#B8922A;animation:progFill .8s ease}
@keyframes progFill{from{width:0}}
.prog-labels{display:flex;justify-content:space-between;font-size:10px;color:#8A8578;font-family:'Jost',sans-serif}

/* ── STAMPS ── */
.stamps{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.stamp{width:26px;height:26px;border-radius:50%;border:1px solid rgba(30,51,40,0.18);background:#EDE8DC;display:flex;align-items:center;justify-content:center;font-size:10px;color:#B4B2A9}
.stamp.lit{background:#1E3328;border-color:#1E3328;color:#FAF7F2}

/* ── TRANSACTIONS ── */
.txn-list{background:#FAF7F2;border:1px solid rgba(30,51,40,0.12);border-radius:14px;overflow:hidden;margin-bottom:10px}
.txn-head{padding:12px 14px;border-bottom:1px solid rgba(30,51,40,0.08);font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:500;color:#1A1A18}
.txn{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid rgba(30,51,40,0.06)}
.txn:last-child{border-bottom:none}
.txn-ico{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;background:#EDE8DC;color:#8A8578}
.txn-ico.earn{background:#EAF3EE;color:#0F6E56}
.txn-info{flex:1}
.txn-n{font-size:12px;color:#1A1A18;font-family:'Jost',sans-serif}
.txn-s{font-size:10px;color:#8A8578;margin-top:1px;font-family:'Jost',sans-serif}
.txn-v{font-size:12px;font-family:'Jost',sans-serif}
.neg{color:#A32D2D}.pos{color:#0F6E56}

/* ── REWARDS ── */
.rew-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.rew-card{background:#FAF7F2;border:1px solid rgba(30,51,40,0.15);border-radius:12px;padding:12px;cursor:pointer;position:relative;overflow:hidden;text-align:left}
.rew-card.feat{border-color:#B8922A}
.rew-card.locked{opacity:.45;cursor:default}
.rew-ico{font-size:20px;margin-bottom:6px}
.rew-name{font-size:12px;color:#1A1A18;font-family:'Jost',sans-serif}
.rew-pts{font-size:11px;color:#B8922A;margin-top:2px;font-family:'Jost',sans-serif;font-weight:500}
.feat-tag{position:absolute;top:0;right:0;font-size:8px;letter-spacing:.08em;text-transform:uppercase;background:#FAEEDA;color:#633806;padding:3px 7px;border-bottom-left-radius:6px;font-family:'Jost',sans-serif}
.lock-tag{position:absolute;top:6px;right:6px;font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:#8A8578;background:#EDE8DC;padding:2px 5px;border-radius:2px;font-family:'Jost',sans-serif}

/* ── TIER TABLE ── */
.tier-table{background:#FAF7F2;border:1px solid rgba(30,51,40,0.12);border-radius:14px;overflow:hidden;margin-bottom:14px}
.tier-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid rgba(30,51,40,0.06);font-size:12px;font-family:'Jost',sans-serif;color:#1A1A18}
.tier-row:last-child{border-bottom:none}
.tier-row.active{background:#FAEEDA;color:#633806}
.tier-perk{font-size:10px;color:#8A8578}
.tier-row.active .tier-perk{color:#854F0B}

/* ── FLAVOR CARDS ── */
.fl-card{background:#FAF7F2;border:1px solid rgba(30,51,40,0.12);border-radius:14px;overflow:hidden;margin-bottom:10px}
.fl-hero{height:80px;display:flex;align-items:center;justify-content:center;font-size:36px;position:relative}
.fl-badge{position:absolute;top:8px;left:8px;font-size:9px;font-weight:400;letter-spacing:.1em;text-transform:uppercase;padding:2px 8px;border-radius:2px;font-family:'Jost',sans-serif}
.fl-badge.dark{background:#1E3328;color:#FAF7F2}
.fl-badge.gold{background:#FAEEDA;color:#633806;border:1px solid rgba(184,146,42,0.3)}
.fl-badge.neutral{background:#EDE8DC;color:#8A8578}
.fl-body{padding:12px 14px}
.fl-name{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:500;color:#1A1A18}
.fl-desc{font-size:11px;color:#8A8578;margin-top:3px;line-height:1.5;font-family:'Jost',sans-serif}
.fl-foot{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.fl-loc{font-size:10px;color:#8A8578;font-family:'Jost',sans-serif;letter-spacing:.04em}
.fl-cta{background:#1E3328;color:#FAF7F2;border:none;padding:5px 14px;border-radius:3px;font-family:'Jost',sans-serif;font-size:10px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer}

/* ── STORE CARDS ── */
.store-card{background:#FAF7F2;border:1px solid rgba(30,51,40,0.12);border-radius:14px;padding:14px;margin-bottom:10px}
.store-mark{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;color:#FAF7F2}
.store-nm{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:500;color:#1A1A18}
.store-ad{font-size:11px;color:#8A8578;margin-top:2px;font-family:'Jost',sans-serif}
.open-pill{display:inline-block;font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:2px 7px;border-radius:2px;margin-top:4px;font-family:'Jost',sans-serif;background:#EAF3EE;color:#0F6E56}
.s-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.s-tag{font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:#8A8578;background:#EDE8DC;padding:2px 7px;border-radius:2px;font-family:'Jost',sans-serif}
.pay-btn{width:100%;margin-top:10px;padding:11px;background:#1E3328;color:#FAF7F2;border:none;border-radius:8px;font-family:'Jost',sans-serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer}

/* ── PROFILE ── */
.prof-hero{background:#1E3328;border-radius:20px;padding:20px;margin-bottom:12px;display:flex;flex-direction:column;align-items:center;text-align:center}
.prof-av{width:60px;height:60px;border-radius:50%;background:#B8922A;border:2px solid rgba(184,146,42,0.4);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;color:#FAF7F2;margin-bottom:10px}
.prof-nm{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:500;color:#FAF7F2}
.prof-mem{font-size:10px;color:rgba(250,247,242,0.45);letter-spacing:.08em;margin-top:3px;font-family:'Jost',sans-serif}
.prof-tier{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#B8922A;border:1px solid rgba(184,146,42,0.4);padding:3px 10px;border-radius:2px;margin-top:10px;font-family:'Jost',sans-serif}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat-c{background:#FAF7F2;border:1px solid rgba(30,51,40,0.12);border-radius:10px;padding:12px}
.stat-lbl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#8A8578;font-family:'Jost',sans-serif}
.stat-val{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:500;color:#1A1A18;margin-top:2px}
.stat-sub{font-size:10px;color:#0F6E56;margin-top:1px;font-family:'Jost',sans-serif}
.bar-sec{background:#FAF7F2;border:1px solid rgba(30,51,40,0.12);border-radius:14px;padding:14px;margin-bottom:10px}
.bar-title{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#8A8578;margin-bottom:12px;font-family:'Jost',sans-serif}
.brow{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.brow:last-child{margin-bottom:0}
.blbl{font-size:10px;color:#8A8578;width:68px;text-align:right;font-family:'Jost',sans-serif}
.btrack{flex:1;background:#EDE8DC;border-radius:10px;height:5px;overflow:hidden}
.bfill{height:100%;border-radius:10px;background:#1E3328;animation:progFill .8s ease}
.bval{font-size:10px;color:#8A8578;min-width:28px;font-family:'Jost',sans-serif}
.ref-box{background:#FAF7F2;border:1px solid rgba(30,51,40,0.15);border-radius:14px;padding:16px;text-align:center;cursor:pointer;margin-bottom:12px}
.ref-code{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;letter-spacing:.2em;color:#1A1A18;margin:6px 0 4px}
.prof-menu{background:#FAF7F2;border:1px solid rgba(30,51,40,0.12);border-radius:14px;overflow:hidden}
.menu-row{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;border-bottom:1px solid rgba(30,51,40,0.06);cursor:pointer}
.menu-row:last-child{border-bottom:none}
.menu-ico{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-right:10px;flex-shrink:0}
.menu-ico svg{width:14px;height:14px;fill:none;stroke:#8A8578;stroke-width:1.8}
.menu-txt{font-size:13px;font-family:'Jost',sans-serif;color:#1A1A18}
.danger .menu-txt{color:#A32D2D}
.danger .menu-ico svg{stroke:#A32D2D}

/* ── INBOX ── */
.inbox-item{background:#FAF7F2;border:1px solid rgba(30,51,40,0.12);border-radius:14px;padding:12px 14px;margin-bottom:8px;display:flex;gap:10px;cursor:pointer}
.inbox-item.unread{border-left:2px solid #B8922A;border-radius:0 14px 14px 0}
.inbox-ico{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.ib-warn{background:#FAEEDA;color:#854F0B}
.ib-ok{background:#EAF3EE;color:#0F6E56}
.ib-dark{background:#1E3328;color:#FAF7F2}
.ib-neutral{background:#EDE8DC;color:#8A8578}
.inbox-title{font-size:12px;font-weight:500;color:#1A1A18;font-family:'Jost',sans-serif;line-height:1.4}
.inbox-body{font-size:11px;color:#8A8578;margin-top:2px;line-height:1.5;font-family:'Jost',sans-serif}
.inbox-time{font-size:9px;color:#C8C3B8;margin-top:4px;letter-spacing:.06em;text-transform:uppercase;font-family:'Jost',sans-serif}
.inbox-back{height:72px;background:#FAF7F2;border-top:1px solid rgba(30,51,40,0.1);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.inbox-back button{font-family:'Jost',sans-serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#1E3328;background:none;border:none;cursor:pointer}

/* ── BOTTOM SHEET ── */
.sheet-overlay{display:none;position:absolute;inset:0;background:rgba(26,26,24,0.6);z-index:50;align-items:flex-end}
.sheet-overlay.on{display:flex}
.sheet{background:#FAF7F2;border-radius:20px 20px 0 0;padding:20px;width:100%;animation:sheetUp .28s cubic-bezier(.32,.72,0,1)}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:3px;background:rgba(30,51,40,0.2);border-radius:2px;margin:0 auto 16px}
.sheet-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:500;color:#1A1A18;text-align:center;margin-bottom:16px}
.sheet-body{font-size:13px;color:#8A8578;text-align:center;line-height:1.6;margin-bottom:16px;font-family:'Jost',sans-serif}
.sheet-btn{width:100%;padding:13px;background:#1E3328;color:#FAF7F2;border:none;border-radius:8px;font-family:'Jost',sans-serif;font-size:12px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;margin-bottom:8px}
.sheet-btn.out{background:transparent;color:#1A1A18;border:1px solid rgba(30,51,40,0.2)}
.amt-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.amt-opt{padding:12px;border:1px solid rgba(30,51,40,0.15);border-radius:8px;background:#EDE8DC;font-size:14px;font-family:'Jost',sans-serif;color:#1A1A18;cursor:pointer;text-align:center}
.amt-opt.sel{background:#1E3328;border-color:#1E3328;color:#FAF7F2}
.qr-frame{background:#1E3328;border-radius:14px;padding:18px;text-align:center;margin-bottom:12px}
.qr-grid{width:100px;height:100px;background:#FAF7F2;border-radius:6px;margin:0 auto 10px;display:grid;grid-template-columns:repeat(10,1fr);padding:6px;gap:1px}
.qc{background:#1E3328;border-radius:1px}
.qc.w{background:#FAF7F2}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════
     DESKTOP — phone frame + side panel
═══════════════════════════════════════════ -->
<div class="desktop">
  <div class="phone-wrap">
    <div class="phone-notch"></div>
    <div class="phone-inner" id="phone-desktop"></div>
  </div>
  <div class="side-info">
    <div style="font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:500;line-height:1.1;margin-bottom:14px;letter-spacing:.02em">Atelier Scoops<br>Loyalty App</div>
    <div style="width:32px;height:1px;background:#B8922A;margin-bottom:18px"></div>
    <p style="font-family:'Jost',sans-serif;font-size:13px;font-weight:300;line-height:1.7;color:rgba(250,247,242,0.6);margin-bottom:22px">Premium artisan ice cream rewards. Earn points, unlock secret flavors, and pay with your wallet across all locations.</p>

    <div style="text-align:center;font-size:44px;margin-bottom:8px">◈</div>
    <div class="sheet-title">A Gift for You, Sagar</div>
    <div class="sheet-body">Your birthday reward is ready — a complimentary double scoop and $5 wallet credit. Valid at either location all month. Show this screen.</div>
    <button class="sheet-btn tap" onclick="closeSheet()">Present at Counter</button>
    <button class="sheet-btn out tap" onclick="closeSheet()">Close</button>`;
  if(type==='redeem') return `
    <div style="text-align:center;font-size:44px;margin-bottom:8px">◇</div>
    <div class="sheet-title">${arg1}</div>
    <div class="sheet-body">Show this screen at any Atelier Scoops location. ${arg2} points will be deducted. Our scoopers will take care of the rest.</div>
    <button class="sheet-btn tap" onclick="closeSheet()">Present at Counter</button>
    <button class="sheet-btn out tap" onclick="closeSheet()">Cancel</button>`;
  if(type==='preorder') return `
    <div style="text-align:center;font-size:44px;margin-bottom:8px">🍦</div>
    <div class="sheet-title">Pre-Order Confirmed</div>
    <div class="sheet-body">Your pre-order for <strong>${arg1}</strong> is confirmed. We'll notify you when ready. 10 bonus points added.</div>
    <button class="sheet-btn tap" onclick="closeSheet()">Done</button>`;
  return '';
}

// ── RENDER ENGINE ─────────────────────────────────────────────────────────
function buildApp(){
  const screenContent=showInbox?buildInbox()
    :currentTab==='wallet'?buildWallet()
    :currentTab==='rewards'?buildRewards()
    :currentTab==='flavors'?buildFlavors()
    :currentTab==='stores'?buildStores()
    :buildProfile();

  const bottomBar=showInbox
    ?`<div class="inbox-back"><button onclick="closeInbox()">← Back</button></div>`
    :buildBottomTabs();

  return `
    ${buildStatusBar()}
    ${buildTopBar()}
    <div class="scroll-area ns" id="scroll">${screenContent}</div>
    ${bottomBar}
    <div class="sheet-overlay" id="sheet-overlay" onclick="closeSheet()">
      <div class="sheet" onclick="event.stopPropagation()">
        <div class="sheet-handle"></div>
        <div id="sheet-content"></div>
      </div>
    </div>`;
}

function render(){
  const html=buildApp();
  const dt=document.getElementById('phone-desktop');
  const mb=document.getElementById('phone-mobile');
  if(dt) dt.innerHTML=html;
  if(mb) mb.innerHTML=html;
}

// ── ACTIONS ───────────────────────────────────────────────────────────────
function goTab(tab){
  currentTab=tab;showInbox=false;
  track('tab_switched',{tab});render();
}
function openInbox(){
  showInbox=true;unread=0;
  track('inbox_opened');render();
}
function closeInbox(){showInbox=false;render();}

function openSheet(type,arg1,arg2){
  render();
  const overlay=document.getElementById('sheet-overlay')||document.querySelector('.sheet-overlay');
  if(!overlay)return;
  const content=overlay.querySelector('#sheet-content');
  if(content)content.innerHTML=buildSheet(type,arg1,arg2);
  overlay.classList.add('on');
  track(type==='qr'?'qr_pay_opened':type==='reload'?'add_funds_opened':type==='redeem'?'reward_tapped':type==='birthday'?'birthday_opened':'flavor_preorder_tapped');
}
function closeSheet(){
  document.querySelectorAll('.sheet-overlay').forEach(o=>o.classList.remove('on'));
}
function selectAmt(a){
  selAmt=a;
  document.querySelectorAll('.amt-opt').forEach(el=>{
    el.classList.toggle('sel',el.textContent===a);
  });
  const btn=document.getElementById('reload-confirm-btn');
  if(btn)btn.textContent=`Add ${a} to Wallet`;
}
function confirmReload(){
  track('funds_added',{amount:selAmt});
  alert(`${selAmt} added to your Atelier Wallet.`);
  closeSheet();
}
function copyRef(){
  navigator.clipboard.writeText('SAGAR50').catch(()=>{});
  const el=document.getElementById('ref-copied');
  if(el){el.style.display='block';setTimeout(()=>{if(el)el.style.display='none';},2000);}
  track('referral_copied');
}

// ── SIDE PANEL FEATURES ───────────────────────────────────────────────────
function buildSidePanel(){
  const fl=document.getElementById('feature-list');
  if(!fl)return;
  fl.innerHTML=FEATURES.map(f=>`
    <div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:9px">
      <span style="font-size:13px;margin-top:1px;flex-shrink:0">${f.i}</span>
      <span style="font-family:'Jost',sans-serif;font-size:13px;font-weight:300;color:rgba(250,247,242,0.65)">${f.t}</span>
    </div>`).join('');
}

// ── INIT ──────────────────────────────────────────────────────────────────
render();
buildSidePanel();
track('app_opened');
</script>
